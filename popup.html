<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    h2 { font-size: 14px; margin: 0 0 8px; color: #0078d4; }
    p { font-size: 12px; color: #555; margin: 0; line-height: 1.5; }
    .status { margin-top: 12px; padding: 8px; background: #e6f4ea; border-radius: 4px; font-size: 12px; color: #1e7e34; }
  </style>
</head>
<body>
  <h2>Microsoft Login Picker</h2>
  <p>This extension forces Azure/Microsoft login pages to always show the account selection screen instead of auto-picking a cached account.</p>
  <div class="status">✓ Active — account selection will be prompted on every Azure login.</div>
</body>
</html>
